version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "yearly"
    groups:
      postgresql:
        patterns:
          - "*postgresql*"
      maven:
        patterns:
          - "*maven*"
      kotlin:
        patterns:
          - "*kotlin*"

  - package-ecosystem: "npm"
    directory: "/mancalaje-fe"
    schedule:
      interval: "yearly"
    groups:
      react:
        patterns:
          - "@react*"
          - "react*"
          - "@types/react*"

  - package-ecosystem: "npm"
    directory: "/kala-game-web"
    schedule:
      interval: "yearly"
    groups:
      angular:
        patterns:
          - "@angular*"
          - "angular*"
