name: QA Mastering Apps Build

on:
  pull_request:
    types:
      - closed
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v7
        - name: Set up JDK 25
          uses: actions/setup-java@v5
          with:
            java-version: '25'
            distribution: 'adopt'

        - name: Build and Test
          run:  make

        - name: Build and Test Fail!
          if: failure()
          run: |
            make print-error-report
